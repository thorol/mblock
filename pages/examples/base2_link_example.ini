<?php

// 🎯 MBlock 4.0 - Link-Beispiel mit MForm

use FriendsOfRedaxo\MForm;
use FriendsOfRedaxo\MBlock\MBlock;

// base ID
$id = 1;

// init mform mit moderner MForm Syntax
$mform = MForm::factory();

// fieldset
$mform->addFieldsetArea('Links');

// link button
$mform->addLinkField(1, array('label' => 'Link'));

// linklist button
$mform->addLinklistField(1, array('label' => 'Link list'));

// 🆕 MBlock 4.0 - Online/Offline Status (hidden field für Toggle-Funktion)
$mform->addHiddenField("$id.0.mblock_offline", '0');

// MBlock anzeigen (Copy & Paste ist automatisch aktiv in MBlock 4.0)
echo MBlock::show($id, $mform->show());

?>
